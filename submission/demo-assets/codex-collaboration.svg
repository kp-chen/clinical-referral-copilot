    <text x="62" y="76" fill="#143550" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="3">CODEX ACCELERATED</text>

    <g transform="translate(62 128)">
      <text x="0" y="38" fill="#07868e" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">01</text>
      <text x="96" y="31" fill="#102b45" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700">Clean-room implementation</text>
      <text x="96" y="70" fill="#587083" font-family="Arial, Helvetica, sans-serif" font-size="21">Fresh Next.js + TypeScript product build</text>
      <line x1="0" y1="112" x2="696" y2="112" stroke="#d6e4eb" stroke-width="2"/>
    </g>

    <g transform="translate(62 314)">
      <text x="0" y="38" fill="#07868e" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">02</text>
      <text x="96" y="31" fill="#102b45" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700">Safety boundary</text>
      <text x="96" y="70" fill="#587083" font-family="Arial, Helvetica, sans-serif" font-size="21">Identifier guards · injection blocking · grounding</text>
      <line x1="0" y1="112" x2="696" y2="112" stroke="#d6e4eb" stroke-width="2"/>
    </g>

    <g transform="translate(62 500)">
      <text x="0" y="38" fill="#07868e" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">03</text>
      <text x="96" y="31" fill="#102b45" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700">Verification workflow</text>
      <text x="96" y="70" fill="#587083" font-family="Arial, Helvetica, sans-serif" font-size="21">API · browser · responsive UI · regression checks</text>
