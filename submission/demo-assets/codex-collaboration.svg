<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#1a3955" stroke-width="1" opacity="0.34"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000814" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#061a32"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <circle cx="1650" cy="116" r="300" fill="#0a7c86" opacity="0.12"/>
  <circle cx="180" cy="980" r="260" fill="#24b8c6" opacity="0.08"/>

  <g transform="translate(92 78)">
    <rect x="0" y="0" width="76" height="76" rx="18" fill="#0c2c4c" stroke="#2eb8c4" stroke-width="2"/>
