    <text x="100" y="31" fill="#f3fbff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">Clinical Referral Copilot</text>
    <text x="100" y="60" fill="#8fb3c7" font-family="Arial, Helvetica, sans-serif" font-size="18">Transparent triage decision support</text>
  </g>

  <g transform="translate(110 245)">
