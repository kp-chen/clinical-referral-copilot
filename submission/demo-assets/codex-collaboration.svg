    <text x="0" y="92" fill="#f6fbff" font-family="Arial, Helvetica, sans-serif" font-size="67" font-weight="700">From clinical concept</text>
    <text x="0" y="168" fill="#f6fbff" font-family="Arial, Helvetica, sans-serif" font-size="67" font-weight="700">to verified prototype.</text>
    <rect x="0" y="220" width="96" height="5" rx="2.5" fill="#2eb8c4"/>

    <text x="0" y="302" fill="#a8c2d2" font-family="Arial, Helvetica, sans-serif" font-size="24">Human decisions set the clinical boundary, synthetic-only scope,</text>
    <text x="0" y="338" fill="#a8c2d2" font-family="Arial, Helvetica, sans-serif" font-size="24">product direction and final visual system.</text>
  </g>

  <g transform="translate(990 225)" filter="url(#shadow)">
